<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex Puzzle Game - Drag & Drop System</title>
    <style>
        /* 画面全体のレイアウト設定：余白を消し、スクロールを防止 */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #C0D6E4; /* 画面全体の背景色：空色 */
            user-select: none; /* テキスト選択を無効化 */
        }

        /* 3Dレンダリングを行うキャンバスコンテナの設定 */
        #game-container {
            position: absolute; /* レイヤー順序を制御するために絶対配置に変更 */
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5; /* UIコンテナより手前に配置して3Dオブジェクトを前面に出す */
            touch-action: none; /* スマホでのデフォルトのスクロール/ズーム挙動を抑制 */
        }
        
        /* 補充用の3つの山を表示する下部UI領域のレイアウト設定 */
        #ui-container {
            position: absolute;
            bottom: 40px; /* 画面下部からの配置マージン */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 50px; /* スロット間の隙間幅を広げて重なりを解消 */
            padding: 20px 45px; /* トレイ内の余白設定 */
            background-color: #8CA0B8; /* トレイのメインカラー：グレーブルー */
            border-radius: 40px; /* トレイの両端を丸める */
            border: 6px solid #75879C; /* トレイのフチの色 */
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.15); /* 下方向に厚みを出す影 */
            z-index: 1; /* ゲーム画面（3Dキャンバス）の背後に配置 */
            pointer-events: none; /* 3D側のクリック判定を優先させるため透過 */
        }
        
        /* 各スロット（山の置き場）のスタイル設定 */
        .slot {
            width: 90px; /* スロットの横幅（タイルが収まるサイズ） */
            height: 90px; /* スロットの縦幅 */
            background-color: rgba(0, 0, 0, 0.12); /* スロットの背景色（凹んで見えるように暗く設定） */
            border-radius: 20px; /* スロットの角丸具合 */
            box-shadow: inset 0 4px 4px rgba(0, 0, 0, 0.2); /* 内部に影をつけて窪みを表現 */
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-container">
        <div class="slot" id="slot-0"></div>
        <div class="slot" id="slot-1"></div>
        <div class="slot" id="slot-2"></div>
    </div>

    <script>
        /**
         * ゲーム定数およびパラメータ定義
         * 人間が調整する可能性が高い数値を中心に定義しています。
         */
        const HEX_SIZE = 2; // 六角形の中心から頂点までの基本距離                                  
        const HEX_HEIGHT = 0.5; // 土台マスの厚み（Y軸方向の高さ）                                
        const HEX_MARGIN = 0.1; // マス同士の隙間の大きさ                                          
        const MAP_RADIUS = 2; // フィールドの層数（中心から外側への周回数）                         
        
        // カメラ制御用パラメータを保持するオブジェクト
        const cameraParams = {
            azimuth: Math.PI / 6, // 現在の方位角（ラジアン）                                      
            distance: 40 // カメラから中心までの距離（初期値）                                      
        };

        const CAMERA_POLAR = Math.PI / 5; // カメラの仰角（固定）                                  
        const ROTATION_SPEED = 0.008; // ドラッグ時の回転感度                                      
        const ZOOM_MARGIN = 2.2; // フィールドが画面に収まる際の距離の倍率                         
        
        const TILE_HEIGHT = 0.35; // タイル本体の厚み                                              
        const TILE_RIM_HEIGHT = 0.1; // タイル底面のフチの厚み                                     
        const TILE_GAP = 0.06; // タイル同士の垂直方向の隙間                                       
        const TILE_RADIUS = HEX_SIZE * 0.85; // タイル上面の半径                                   
        const TILE_BOTTOM_SCALE = 1.05; // タイル底面のテーパー倍率                                
        
        const DRAG_Y_OFFSET = 2.0; // ドラッグ中にタイルを浮かせる高さ                             

        const MERGE_ANIM_DURATION = 0.5; // 結合時の水平移動アニメーション時間                      
        const MERGE_ANIM_DELAY = 0.1; // 結合時の複数タイルの移動開始のズレ時間                    

        // 六角形グリッドにおける隣接する6方向の座標オフセット
        const HEX_DIRECTIONS = [
            { q: 1, r: 0 }, { q: 1, r: -1 }, { q: 0, r: -1 },
            { q: -1, r: 0 }, { q: -1, r: 1 }, { q: 0, r: 1 }
        ];

        // タイルに使用する6色のカラーコード定義
        const TILE_COLORS = {
            red: 0xFF4136,
            blue: 0x0074D9,
            green: 0x2ECC40,
            yellow: 0xFFDC00,
            purple: 0xB10DC9,
            cyan: 0x7FDBFF
        };

        /**
         * グローバル変数の宣言
         * シーン構成要素や状態管理用の変数を保持します。
         */
        let isDragging = false; // カメラ回転用のドラッグ中フラグ                                   
        let previousPointerX = 0; // 直前のポインターのX座標                                       
        let previousPointerY = 0; // 直前のポインターのY座標                                       

        let scene, camera, renderer;
        let hexGridData = []; // 各マスの論理的な状態を保持する配列                                
        let hexMeshes = []; // レイキャスト判定用の土台メッシュ配列                                
        let topTextures = []; // カメラ方向を向かせる必要のあるテクスチャの配列                    

        let raycaster = new THREE.Raycaster(); // マウス位置から物体を特定するための光線           
        let mouse = new THREE.Vector2(); // 正規化されたマウス座標                                 
        let draggedStack = null; // 現在ドラッグ操作中のTileStackインスタンス                      
        let trayStacks = [null, null, null]; // トレイの各スロットにあるスタック                   
        let trayOriginalPositions = []; // 各スロットの同期されたワールド座標                      

        /**
         * 座標変換：軸座標(q, r)をワールド座標(x, z)に変換する
         * 六角形グリッド特引の計算式を用いて、3D空間上の位置を算出します。
         */
        function axialToWorld(q, r, size) {
            const x = size * (3/2) * q;
            const z = size * (Math.sqrt(3)/2) * q + size * Math.sqrt(3) * r;
            return { x, z };
        }

        /**
         * テクスチャ生成：数字が描かれたCanvasテクスチャを作成する
         * タイルの天面に表示する数字と背景色のテクスチャを動的に生成します。
         */
        function createNumberTexture(number, colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; 
            canvas.height = 256; 
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#' + colorHex.toString(16).padStart(6, '0');
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ffffff'; 
            ctx.font = 'bold 120px Arial'; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 6;
            ctx.strokeText(number, canvas.width / 2, canvas.height / 2);
            ctx.fillText(number, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            texture.center.set(0.5, 0.5); 
            return texture;
        }

        /**
         * ロジック：タイルの枚数と色構成をランダムに決定する
         * 新しい山のデータを生成する際に使用します。
         */
        function generateRandomStackData() {
            const totalCount = Math.floor(Math.random() * 8) + 2; 
            const maxColors = Math.min(3, totalCount); 
            const colorCount = Math.floor(Math.random() * maxColors) + 1; 

            const colors = Object.keys(TILE_COLORS);
            const selectedColors = [];
            
            while (selectedColors.length < colorCount) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                if (!selectedColors.includes(color)) {
                    selectedColors.push(color);
                }
            }

            const stackData = [];
            let remaining = totalCount;
            
            for (let i = 0; i < colorCount; i++) {
                if (i === colorCount - 1) {
                    stackData.push({ color: selectedColors[i], count: remaining });
                } else {
                    const maxForThis = remaining - (colorCount - 1 - i);
                    const count = Math.floor(Math.random() * maxForThis) + 1;
                    stackData.push({ color: selectedColors[i], count: count });
                    remaining -= count;
                }
            }
            return stackData;
        }

        /**
         * 描画：指定されたマスのデータに基づき、メッシュを再構築する
         * データの変更（配置、結合など）があった際に見た目を最新状態に更新します。
         */
        function rebuildTileMesh(tileData) {
            if (tileData.meshGroup) {
                scene.remove(tileData.meshGroup);
            }
            
            if (!tileData.stack || tileData.stack.length === 0) {
                tileData.state = 'empty';
                tileData.meshGroup = null;
                return;
            }

            const group = new THREE.Group();
            let currentHeight = 0;

            const bodyGeometry = new THREE.CylinderGeometry(TILE_RADIUS, TILE_RADIUS * TILE_BOTTOM_SCALE, TILE_HEIGHT, 6);
            const rimGeometry = new THREE.CylinderGeometry(TILE_RADIUS * TILE_BOTTOM_SCALE, TILE_RADIUS * TILE_BOTTOM_SCALE * 1.02, TILE_RIM_HEIGHT, 6);

            for (let i = 0; i < tileData.stack.length; i++) {
                const block = tileData.stack[i];
                const colorHex = TILE_COLORS[block.color];

                for (let j = 0; j < block.count; j++) {
                    const tileGroup = new THREE.Group();

                    const rimColor = new THREE.Color(colorHex).multiplyScalar(0.4);
                    const rimMaterial = new THREE.MeshStandardMaterial({ color: rimColor, roughness: 0.8 });
                    const rimMesh = new THREE.Mesh(rimGeometry, rimMaterial);
                    rimMesh.position.y = TILE_RIM_HEIGHT / 2;
                    rimMesh.rotation.y = Math.PI / 6;
                    tileGroup.add(rimMesh);

                    const sideMaterial = new THREE.MeshStandardMaterial({
                        color: colorHex,
                        roughness: 0.5,
                        metalness: 0.1
                    });

                    const isTopTile = (i === tileData.stack.length - 1) && (j === block.count - 1);
                    let materials = [sideMaterial, sideMaterial, sideMaterial];

                    if (isTopTile) {
                        const topTexture = createNumberTexture(block.count, colorHex);
                        topTexture.rotation = cameraParams.azimuth - Math.PI / 6 + Math.PI / 2;
                        
                        const topMaterial = new THREE.MeshStandardMaterial({
                            roughness: 0.5,
                            metalness: 0.1,
                            map: topTexture
                        });
                        materials[1] = topMaterial;
                        topTextures.push(topTexture);
                    }

                    const bodyMesh = new THREE.Mesh(bodyGeometry, materials);
                    bodyMesh.position.y = TILE_RIM_HEIGHT + (TILE_HEIGHT / 2);
                    bodyMesh.rotation.y = Math.PI / 6;
                    tileGroup.add(bodyMesh);

                    tileGroup.position.y = currentHeight;
                    group.add(tileGroup);

                    currentHeight += (TILE_HEIGHT + TILE_RIM_HEIGHT + TILE_GAP);
                }
            }
            
            const worldPos = axialToWorld(tileData.q, tileData.r, HEX_SIZE);
            group.position.set(worldPos.x, 0, worldPos.z);
            scene.add(group);
            tileData.meshGroup = group;
        }

        /**
         * 補助：アニメーション用の一時的なタイル群メッシュを生成する
         * 結合アニメーション中に飛行させるための独立したメッシュを作成します。
         */
        function createTempMeshes(worldPos, baseHeight, count, colorName) {
            const meshes = [];
            const colorHex = TILE_COLORS[colorName];
            
            const bodyGeometry = new THREE.CylinderGeometry(TILE_RADIUS, TILE_RADIUS * TILE_BOTTOM_SCALE, TILE_HEIGHT, 6);
            const rimGeometry = new THREE.CylinderGeometry(TILE_RADIUS * TILE_BOTTOM_SCALE, TILE_RADIUS * TILE_BOTTOM_SCALE * 1.02, TILE_RIM_HEIGHT, 6);

            for (let i = 0; i < count; i++) {
                const tileGroup = new THREE.Group();

                const rimColor = new THREE.Color(colorHex).multiplyScalar(0.4);
                const rimMaterial = new THREE.MeshStandardMaterial({ color: rimColor, roughness: 0.8 });
                const rimMesh = new THREE.Mesh(rimGeometry, rimMaterial);
                rimMesh.position.y = TILE_RIM_HEIGHT / 2;
                rimMesh.rotation.y = Math.PI / 6;
                tileGroup.add(rimMesh);

                const sideMaterial = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.5, metalness: 0.1 });
                let materials = [sideMaterial, sideMaterial, sideMaterial];
                
                if (i === count - 1) {
                    const topTexture = createNumberTexture(count, colorHex);
                    topTexture.rotation = cameraParams.azimuth - Math.PI / 6 + Math.PI / 2;
                    const topMaterial = new THREE.MeshStandardMaterial({ roughness: 0.5, metalness: 0.1, map: topTexture });
                    materials[1] = topMaterial;
                    topTextures.push(topTexture);
                }

                const bodyMesh = new THREE.Mesh(bodyGeometry, materials);
                bodyMesh.position.y = TILE_RIM_HEIGHT + (TILE_HEIGHT / 2);
                bodyMesh.rotation.y = Math.PI / 6;
                tileGroup.add(bodyMesh);

                tileGroup.position.set(worldPos.x, baseHeight + i * (TILE_HEIGHT + TILE_RIM_HEIGHT + TILE_GAP), worldPos.z);
                meshes.push(tileGroup);
            }
            return meshes;
        }

        /**
         * クラス：TileStack
         * トレイに存在する「ドラッグ可能なタイルの山」を管理します。
         */
        class TileStack {
            constructor() {
                this.stackData = generateRandomStackData();
                this.meshGroup = this.createMeshGroup();
                this.slotIndex = -1;                     
            }

            createMeshGroup() {
                const group = new THREE.Group();
                let currentHeight = 0; 

                const bodyGeometry = new THREE.CylinderGeometry(TILE_RADIUS, TILE_RADIUS * TILE_BOTTOM_SCALE, TILE_HEIGHT, 6);
                const rimGeometry = new THREE.CylinderGeometry(TILE_RADIUS * TILE_BOTTOM_SCALE, TILE_RADIUS * TILE_BOTTOM_SCALE * 1.02, TILE_RIM_HEIGHT, 6);

                for (let i = 0; i < this.stackData.length; i++) {
                    const block = this.stackData[i];
                    const colorHex = TILE_COLORS[block.color];

                    for (let j = 0; j < block.count; j++) {
                        const tileGroup = new THREE.Group(); 

                        const rimColor = new THREE.Color(colorHex).multiplyScalar(0.4); 
                        const rimMaterial = new THREE.MeshStandardMaterial({ color: rimColor, roughness: 0.8 });
                        const rimMesh = new THREE.Mesh(rimGeometry, rimMaterial);
                        rimMesh.position.y = TILE_RIM_HEIGHT / 2;
                        rimMesh.rotation.y = Math.PI / 6;
                        tileGroup.add(rimMesh);

                        const sideMaterial = new THREE.MeshStandardMaterial({
                            color: colorHex,
                            roughness: 0.5,
                            metalness: 0.1
                        });

                        const isTopTile = (i === this.stackData.length - 1) && (j === block.count - 1);
                        let materials = [sideMaterial, sideMaterial, sideMaterial]; 

                        if (isTopTile) {
                            const topTexture = createNumberTexture(block.count, colorHex);
                            const topMaterial = new THREE.MeshStandardMaterial({
                                roughness: 0.5,
                                metalness: 0.1,
                                map: topTexture
                            });
                            materials[1] = topMaterial;
                            topTextures.push(topTexture);
                        }

                        const bodyMesh = new THREE.Mesh(bodyGeometry, materials);
                        bodyMesh.position.y = TILE_RIM_HEIGHT + (TILE_HEIGHT / 2);
                        bodyMesh.rotation.y = Math.PI / 6;
                        tileGroup.add(bodyMesh);

                        tileGroup.position.y = currentHeight;
                        group.add(tileGroup);

                        currentHeight += (TILE_HEIGHT + TILE_RIM_HEIGHT + TILE_GAP);
                    }
                }
                
                group.traverse((child) => {
                    if (child instanceof THREE.Mesh) child.userData.owner = this;
                });
                return group;
            }
        }

        /**
         * 初期化：Three.jsシーンの構築と基本設定を行う
         */
        function init() {
            const container = document.getElementById('game-container');

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            updateCameraPosition();

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);                      
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.4);             
            directionalLight.position.set(10, 20, 10);                                
            scene.add(directionalLight);

            generateField(); 
            placeInitialStacks(); 
            initTray(); 

            window.addEventListener('resize', onWindowResize, false);
            container.addEventListener('pointerdown', onPointerDown, false);
            window.addEventListener('pointermove', onPointerMove, false);
            window.addEventListener('pointerup', onPointerUp, false);

            adjustCameraZoom(false); 

            animate(); 
        }

        /**
         * 生成：フィールド（六角形土台）を配置する
         */
        function generateField() {
            const geometry = new THREE.CylinderGeometry(HEX_SIZE - HEX_MARGIN, HEX_SIZE - HEX_MARGIN, HEX_HEIGHT, 6);
            const material = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.8, metalness: 0.1 });

            for (let q = -MAP_RADIUS; q <= MAP_RADIUS; q++) {
                const r1 = Math.max(-MAP_RADIUS, -q - MAP_RADIUS);
                const r2 = Math.min(MAP_RADIUS, -q + MAP_RADIUS);
                
                for (let r = r1; r <= r2; r++) {
                    const pos = axialToWorld(q, r, HEX_SIZE);
                    const hexMesh = new THREE.Mesh(geometry, material);
                    hexMesh.rotation.y = Math.PI / 6;                     
                    hexMesh.position.set(pos.x, -HEX_HEIGHT / 2, pos.z);
                    
                    hexMesh.userData.q = q;
                    hexMesh.userData.r = r;
                    hexMeshes.push(hexMesh);
                    scene.add(hexMesh);

                    hexGridData.push({ q: q, r: r, state: 'empty', stack: [], meshGroup: null });
                }
            }
        }

        /**
         * トレイ：補充用スタックを初期化する
         */
        function initTray() {
            for (let i = 0; i < 3; i++) {
                const stack = new TileStack();
                stack.slotIndex = i;
                trayStacks[i] = stack;
                trayOriginalPositions[i] = new THREE.Vector3(); 
                scene.add(stack.meshGroup);
            }
            updateTrayPositions();
        }

        /**
         * 同期：HTMLのスロット位置に合わせて3Dオブジェクトの位置を更新する
         */
        function updateTrayPositions() {
            trayStacks.forEach((stack, i) => {
                if (!stack || stack === draggedStack) return;

                const slot = document.getElementById(`slot-${i}`);
                if (!slot) return;

                const rect = slot.getBoundingClientRect();
                const x = ((rect.left + rect.width / 2) / window.innerWidth) * 2 - 1;
                const y = -((rect.top + rect.height / 2) / window.innerHeight) * 2 + 1;

                const vector = new THREE.Vector3(x, y, 0.5);
                vector.unproject(camera);
                const dir = vector.sub(camera.position).normalize();
                const distance = -camera.position.y / dir.y; 
                const worldPos = camera.position.clone().add(dir.multiplyScalar(distance));

                stack.meshGroup.position.copy(worldPos);
                trayOriginalPositions[i].copy(worldPos); 
            });
        }

        /**
         * 初期配置：フィールド上にデモ用のタイルを置く
         */
        function placeInitialStacks() {
            const testPositions = [{ q: 0, r: 0 }, { q: 1, r: -1 }];
            testPositions.forEach(pos => {
                const tileData = hexGridData.find(t => t.q === pos.q && t.r === pos.r);
                if (tileData) {
                    tileData.state = 'filled';
                    tileData.stack = generateRandomStackData();
                    rebuildTileMesh(tileData);
                }
            });
            updateCameraPosition(); 
        }

        /**
         * カメラ：方位角や距離に基づき座標を更新し、テクスチャの向きを調整する
         */
        function updateCameraPosition() {
            camera.position.x = cameraParams.distance * Math.sin(CAMERA_POLAR) * Math.sin(cameraParams.azimuth);
            camera.position.y = cameraParams.distance * Math.cos(CAMERA_POLAR);
            camera.position.z = cameraParams.distance * Math.sin(CAMERA_POLAR) * Math.cos(cameraParams.azimuth);
            
            camera.lookAt(0, 0, 0);

            topTextures.forEach(tex => {
                tex.rotation = cameraParams.azimuth - Math.PI / 6 + Math.PI / 2;
            });

            updateTrayPositions();
        }

        /**
         * カメラ：フィールドが画面に収まるよう自動的に距離(ズーム)を調整する
         */
        function adjustCameraZoom(animateFlag = true) {
            const fieldRadius = MAP_RADIUS * HEX_SIZE * 2.0;                                 
            const fov = camera.fov * (Math.PI / 180);                                            
            const aspect = camera.aspect;
            
            const distanceHeight = fieldRadius / Math.tan(fov / 2);
            const distanceWidth = (fieldRadius / aspect) / Math.tan(fov / 2);
            
            const targetDistance = Math.max(distanceHeight, distanceWidth) * ZOOM_MARGIN; 

            if (animateFlag) {
                gsap.to(cameraParams, {
                    distance: targetDistance,
                    duration: 0.8,                                  
                    ease: "power2.out",
                    onUpdate: updateCameraPosition
                });
            } else {
                cameraParams.distance = targetDistance;
                updateCameraPosition();
            }
        }

        /**
         * 入力：ポインター押下時の処理（ドラッグ開始またはカメラ回転開始）
         */
        function onPointerDown(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const trayMeshes = [];
            trayStacks.forEach(s => { if(s) trayMeshes.push(...s.meshGroup.children); });
            const trayIntersects = raycaster.intersectObjects(trayMeshes, true);

            if (trayIntersects.length > 0) {
                draggedStack = trayIntersects[0].object.userData.owner;
                gsap.to(draggedStack.meshGroup.position, { y: DRAG_Y_OFFSET, duration: 0.2 });
            } else {
                isDragging = true;
                previousPointerX = event.clientX;
                previousPointerY = event.clientY;
                gsap.killTweensOf(cameraParams); 
            }
        }

        /**
         * 入力：ポインター移動時の処理（タイル追従またはカメラ回転実行）
         */
        function onPointerMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            if (draggedStack) {
                raycaster.setFromCamera(mouse, camera);
                const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -DRAG_Y_OFFSET);
                const intersectPoint = new THREE.Vector3();
                raycaster.ray.intersectPlane(dragPlane, intersectPoint);
                if (intersectPoint) {
                    draggedStack.meshGroup.position.x = intersectPoint.x;
                    draggedStack.meshGroup.position.z = intersectPoint.z;
                }
            } else if (isDragging) {
                const deltaX = event.clientX - previousPointerX;
                cameraParams.azimuth -= deltaX * ROTATION_SPEED;
                updateCameraPosition();
                previousPointerX = event.clientX;
                previousPointerY = event.clientY;
            }
        }

        /**
         * 入力：ポインター離した時の処理（配置判定またはカメラのスナップ回転）
         */
        function onPointerUp() {
            if (draggedStack) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(hexMeshes);

                if (intersects.length > 0) {
                    const targetHexMesh = intersects[0].object;
                    const q = targetHexMesh.userData.q;
                    const r = targetHexMesh.userData.r;
                    const tileData = hexGridData.find(t => t.q === q && t.r === r);

                    if (tileData && tileData.state === 'empty') {
                        tileData.state = 'filled';
                        tileData.stack = JSON.parse(JSON.stringify(draggedStack.stackData));
                        
                        scene.remove(draggedStack.meshGroup);
                        rebuildTileMesh(tileData);

                        trayStacks[draggedStack.slotIndex] = null;
                        draggedStack = null;
                        
                        checkAndMerge(q, r);
                    } else {
                        returnToTray(draggedStack);
                    }
                } else {
                    returnToTray(draggedStack);
                }
            }

            if (isDragging) {
                isDragging = false;
                const snapAngle = Math.PI / 3; 
                const targetAzimuth = Math.round(cameraParams.azimuth / snapAngle) * snapAngle;
                gsap.to(cameraParams, {
                    azimuth: targetAzimuth, duration: 0.6, ease: "back.out(1.5)", onUpdate: updateCameraPosition
                });
                adjustCameraZoom(true);
            }
        }

        /**
         * ロジック：配置されたタイルを中心に、同色の最上部タイルを持つマスを探索し結合する
         * 幅優先探索で連結成分を見つけ、配置位置（ターゲット）へアニメーション移動させます。
         */
        function checkAndMerge(targetQ, targetR) {
            const targetTile = hexGridData.find(t => t.q === targetQ && t.r === targetR);
            if (!targetTile || targetTile.state !== 'filled' || targetTile.stack.length === 0) return;

            const targetTopBlock = targetTile.stack[targetTile.stack.length - 1];
            const targetColor = targetTopBlock.color;

            const visited = new Set();
            const queue = [{q: targetQ, r: targetR}];
            visited.add(`${targetQ},${targetR}`);
            const mergeSources = [];

            while (queue.length > 0) {
                const curr = queue.shift();
                for (let dir of HEX_DIRECTIONS) {
                    const nq = curr.q + dir.q;
                    const nr = curr.r + dir.r;
                    const key = `${nq},${nr}`;
                    if (!visited.has(key)) {
                        const nTile = hexGridData.find(t => t.q === nq && t.r === nr);
                        if (nTile && nTile.state === 'filled' && nTile.stack.length > 0) {
                            const nTopBlock = nTile.stack[nTile.stack.length - 1];
                            if (nTopBlock.color === targetColor) {
                                visited.add(key);
                                queue.push({q: nq, r: nr});
                                mergeSources.push(nTile);
                            }
                        }
                    }
                }
            }

            if (mergeSources.length === 0) return;

            let totalMergedCount = targetTopBlock.count;
            targetTile.stack.pop();
            
            const targetWorldPos = axialToWorld(targetQ, targetR, HEX_SIZE);
            let targetBaseHeight = 0;
            targetTile.stack.forEach(block => {
                targetBaseHeight += block.count * (TILE_HEIGHT + TILE_RIM_HEIGHT + TILE_GAP);
            });

            rebuildTileMesh(targetTile);

            const meshesToRemove = [];
            
            const targetTempMeshes = createTempMeshes(targetWorldPos, targetBaseHeight, targetTopBlock.count, targetColor);
            targetTempMeshes.forEach(mesh => {
                scene.add(mesh);
                meshesToRemove.push(mesh);
            });
            
            let currentTargetStackHeight = targetBaseHeight + targetTopBlock.count * (TILE_HEIGHT + TILE_RIM_HEIGHT + TILE_GAP);
            
            let animationsCompleted = 0;
            let totalAnimations = 0;

            mergeSources.forEach(sourceTile => {
                const sourceTopBlock = sourceTile.stack.pop();
                const sourceCount = sourceTopBlock.count;
                totalMergedCount += sourceCount;

                const sourceWorldPos = axialToWorld(sourceTile.q, sourceTile.r, HEX_SIZE);
                
                let sourceBaseHeight = 0;
                sourceTile.stack.forEach(block => {
                    sourceBaseHeight += block.count * (TILE_HEIGHT + TILE_RIM_HEIGHT + TILE_GAP);
                });

                rebuildTileMesh(sourceTile);

                const tempMeshes = createTempMeshes(sourceWorldPos, sourceBaseHeight, sourceCount, targetColor);
                
                tempMeshes.forEach((mesh, index) => {
                    scene.add(mesh);
                    meshesToRemove.push(mesh);
                    totalAnimations++;

                    const startY = mesh.position.y;
                    const endX = targetWorldPos.x;
                    const endZ = targetWorldPos.z;
                    const endY = currentTargetStackHeight + index * (TILE_HEIGHT + TILE_RIM_HEIGHT + TILE_GAP);

                    const distance = Math.sqrt(Math.pow(endX - sourceWorldPos.x, 2) + Math.pow(endZ - sourceWorldPos.z, 2));
                    const arcHeight = Math.max(startY, endY) + distance * 0.4;

                    gsap.to(mesh.position, {
                        x: endX,
                        z: endZ,
                        duration: MERGE_ANIM_DURATION,
                        delay: MERGE_ANIM_DELAY * index,
                        ease: "power1.inOut"
                    });

                    gsap.to(mesh.position, {
                        y: arcHeight,
                        duration: MERGE_ANIM_DURATION / 2,
                        delay: MERGE_ANIM_DELAY * index,
                        ease: "power1.out",
                        onComplete: () => {
                            gsap.to(mesh.position, {
                                y: endY,
                                duration: MERGE_ANIM_DURATION / 2,
                                ease: "power1.in",
                                onComplete: () => {
                                    animationsCompleted++;
                                    if (animationsCompleted === totalAnimations) {
                                        finalizeMerge();
                                    }
                                }
                            });
                        }
                    });
                });
                
                currentTargetStackHeight += sourceCount * (TILE_HEIGHT + TILE_RIM_HEIGHT + TILE_GAP);
            });

            function finalizeMerge() {
                meshesToRemove.forEach(mesh => scene.remove(mesh));
                targetTile.stack.push({ color: targetColor, count: totalMergedCount });
                rebuildTileMesh(targetTile);
            }
        }

        /**
         * 補助：配置できなかったスタックを元のトレイ位置に戻す
         */
        function returnToTray(stack) {
            const originalPos = trayOriginalPositions[stack.slotIndex];
            gsap.to(stack.meshGroup.position, {
                x: originalPos.x, y: originalPos.y, z: originalPos.z, duration: 0.4, ease: "power2.out"
            });
            draggedStack = null;
        }

        /**
         * システム：ウィンドウリサイズ時に描画領域を再計算する
         */
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustCameraZoom(false);
            updateTrayPositions();
        }

        /**
         * ループ：メインレンダリング処理を毎フレーム実行する
         */
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
